   <div class="uc-wrapper">
  <div class="uc-card">

    <!-- Header -->
    <div class="uc-header">
      <div class="uc-header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="26" height="26">
          <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5z"/>
          <path d="M4 22c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
      </div>
      <div>
        <h2 class="uc-title">Modifier mon compte</h2>
        <p class="uc-subtitle">Mettez à jour vos informations</p>
      </div>
    </div>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="updateCompte()">

      <div class="uc-field">
        <label class="uc-label">Nom</label>
        <div class="uc-input-wrap">
          <svg class="uc-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input class="uc-input" type="text" formControlName="nom" placeholder="Votre nom">
        </div>
      </div>

      <div class="uc-field">
        <label class="uc-label">Email</label>
        <div class="uc-input-wrap">
          <svg class="uc-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input class="uc-input" type="email" formControlName="email" placeholder="votre@email.com">
        </div>
      </div>

      <div class="uc-field">
        <label class="uc-label">Nom Garage</label>
        <div class="uc-input-wrap">
          <svg class="uc-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8z"/>
          </svg>
          <input class="uc-input" type="text" formControlName="Nomgarage" placeholder="Nom de votre garage">
        </div>
      </div>

      <div class="uc-field">
        <label class="uc-label">Nouveau mot de passe <span class="uc-optional">(optionnel)</span></label>
        <div class="uc-input-wrap">
          <svg class="uc-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input class="uc-input" [type]="showPassword ? 'text' : 'password'"
                 formControlName="motdepasse" placeholder="••••••••">
          <button type="button" class="uc-eye" (click)="togglePassword()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
              <path *ngIf="!showPassword" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle *ngIf="!showPassword" cx="12" cy="12" r="3"/>
              <path *ngIf="showPassword" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line *ngIf="showPassword" x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="uc-actions">
        <button type="button" class="uc-btn-cancel" (click)="goToDashboard()">
           Annuler
        </button>
        <button type="submit" class="uc-btn-save">
          Modifie
        </button>
      </div>

    </form>
  </div>
</div>
  
  </main>
</div>
